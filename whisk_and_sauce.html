<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: green;
            overflow: hidden;
        }

        #container {
            position: relative;
            width: 300px;
            height: 300px;
        }

        .whisk {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            width: 50px;
            height: 50px;
            background-color: violet;
            border-radius: 0 0 50% 50% / 0 0 75% 75%;
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2);
            animation: whisk-rotate 2s linear infinite;
        }

        .sauce {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 10px;
            background: linear-gradient(to bottom, transparent, #ff0000);
            border-radius: 0 0 10px 10px / 0 0 25% 25%;
            animation: sauce-pour 2s linear infinite;
        }

        @keyframes whisk-rotate {
            0% {
                transform: translate(-50%, -50%) rotate(-45deg);
            }
            100% {
                transform: translate(-50%, -50%) rotate(315deg);
            }
        }

        @keyframes sauce-pour {
            0% {
                height: 10px;
            }
            100% {
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="whisk"></div>
        <div class="sauce"></div>
    </div>

    <script>
        const container = document.getElementById('container');
        const whisk = document.querySelector('.whisk');
        const sauce = document.querySelector('.sauce');

        function updateWhiskPosition() {
            const containerWidth = container.offsetWidth;
            const containerHeight = container.offsetHeight;
            const whiskWidth = whisk.offsetWidth;
            const whiskHeight = whisk.offsetHeight;

            whisk.style.top = `${containerHeight / 2 - whiskHeight / 2}px`;
            whisk.style.left = `${containerWidth / 2 - whiskWidth / 2}px`;
        }

        function updateSaucePosition() {
            const containerWidth = container.offsetWidth;
            const containerHeight = container.offsetHeight;
            const sauceHeight = sauce.offsetHeight;

            sauce.style.bottom = `${containerHeight - sauceHeight}px`;
            sauce.style.left = `${containerWidth / 2 - sauce.offsetWidth / 2}px`;
        }

        window.addEventListener('resize', () => {
            updateWhiskPosition();
            updateSaucePosition();
        });

        updateWhiskPosition();
        updateSaucePosition();
    </script>
